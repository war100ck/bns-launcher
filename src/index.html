<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blade & Soul Game Launcher</title>
  <link rel="stylesheet" href="./libs/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="./libs/fontawesome/all.min.css">
  <link rel="stylesheet" href="./libs/toastr/toastr.min.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body oncontextmenu="return false">

  <div class="top-bar" data-tauri-drag-region>
    <div class="drag-area" data-tauri-drag-region>
      <!-- Соц. иконки БЕЗ target="_blank" и БЕЗ href для предотвращения дублирования -->
      <div class="social-icons">
        <a href="#" data-url="https://discord.gg/PHPmpVQaQA" class="social-icon ragezone-icon external-link">
          <img src="../assets/images/ragezone.webp" alt="Discord" class="social-icon-img">
        </a>
        <a href="#" id="bns-link" data-url="" class="social-icon bns-icon external-link">
          <img src="../assets/images/logo.webp" alt="Blade & Soul" class="social-icon-img">
        </a>
      </div>

      <div class="control-icons">
        <div class="control-icon" id="registrationButton" data-i18n-title="ui.signInSignUp" title="SignIn/SignUp">
          <i class="fas fa-user-plus"></i>
        </div>
        <div class="control-icon" id="settingsButton" data-i18n-title="ui.settings" title="Settings">
          <i class="fas fa-cog"></i>
        </div>
      </div>

      <div class="window-control-icons">
        <div class="window-control-icon" id="minimizeButton" data-i18n-title="ui.minimize" title="Minimize">
          <i class="fas fa-minus"></i>
        </div>
        <div class="window-control-icon" id="closeButton" data-i18n-title="ui.close" title="Close">
          <i class="fas fa-times"></i>
        </div>
      </div>
    </div>
  </div>

  <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img class="d-block w-100" src="../assets/images/slide/index.webp" alt="First slide">
      </div>
      <div class="carousel-item">
        <img class="d-block w-100" src="../assets/images/slide/index_2.webp" alt="Second slide">
      </div>
      <div class="carousel-item">
        <img class="d-block w-100" src="../assets/images/slide/index_3.webp" alt="Third slide">
      </div>
      <div class="carousel-item">
        <img class="d-block w-100" src="../assets/images/slide/index_4.webp" alt="Fourth slide">
      </div>
    </div>
  </div>

  <div class="content">
    <div class="text-image-container">
      <img id="mainTextImage" src="../assets/images/text-orange.webp" alt="Text Image" class="main-text-image">
    </div>
    <a href="#" id="playButton" class="sliding-button" data-i18n="ui.play">Play</a>
  </div>

  <div id="loadingBar" class="progress loading-bar">
    <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%;"></div>
  </div>

  <div id="registerPage" class="side-page">
    <div class="side-page-header">
      <i class="fas fa-user-plus side-page-back-icon"></i>
      <span class="side-page-back-text" id="toggleSignInSignUp" style="cursor: pointer;" data-i18n="ui.signInSignUp">SignIn/SignUp</span>
      <i id="closeRegisterPage" class="fa-solid fa-circle-arrow-right close-panel" title="Закрыть"></i>
    </div>
    <div class="side-page-content">
      <div id="registrationForm">
        <div class="form-group mb-3">
          <label for="accountName" data-i18n="ui.accountName">Account Name</label>
          <input type="text" id="accountName" class="form-control" 
                 data-i18n-placeholder="placeholders.accountName" 
                 placeholder="Enter your account name"
                 autocomplete="off" autocapitalize="off" autocorrect="off" 
                 spellcheck="false" data-lpignore="true">
        </div>
        <div class="form-group mb-3">
          <label for="email" data-i18n="ui.email">Email</label>
          <input type="email" id="email" class="form-control" 
                 data-i18n-placeholder="placeholders.email" 
                 placeholder="Enter your email"
                 autocomplete="off" autocapitalize="off" autocorrect="off" 
                 spellcheck="false" data-lpignore="true">
        </div>
        <div class="form-group mb-3">
          <label for="password" data-i18n="ui.password">Password</label>
          <input type="password" id="password" class="form-control" 
                 data-i18n-placeholder="placeholders.password" 
                 placeholder="Enter your password"
                 autocomplete="new-password" autocapitalize="off" autocorrect="off" 
                 spellcheck="false" data-lpignore="true">
        </div>
        <button id="registrationButtonSubmit" class="btn btn-primary w-100" data-i18n="ui.registration">Registration</button>
        <div class="button-container">
          <button id="showLoginForm" class="custom-button">
            <span data-i18n="ui.alreadyHaveAccount">Already have an account?</span> 
            <span class="highlight" data-i18n="ui.login">Login</span>
          </button>
        </div>
      </div>

      <div id="loginForm" style="display: none;">
        <div class="form-group mb-3">
          <label for="loginEmail" data-i18n="ui.email">Email</label>
          <input type="text" id="loginEmail" class="form-control" 
                 data-i18n-placeholder="placeholders.email" 
                 placeholder="Enter your email"
                 autocomplete="off" autocapitalize="off" autocorrect="off" 
                 spellcheck="false" data-lpignore="true">
        </div>
        <div class="form-group mb-3">
          <label for="loginPassword" data-i18n="ui.password">Password</label>
          <input type="password" id="loginPassword" class="form-control" 
                 data-i18n-placeholder="placeholders.password" 
                 placeholder="Enter your password"
                 autocomplete="new-password" autocapitalize="off" autocorrect="off" 
                 spellcheck="false" data-lpignore="true">
        </div>
        <button id="loginButtonSubmit" class="btn btn-primary w-100" data-i18n="ui.login">Login</button>
        <div class="button-container">
          <button id="showRegistrationForm" class="custom-button">
            <span data-i18n="ui.noAccount">Don't have an account?</span> 
            <span class="highlight" data-i18n="ui.registration">Register</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="settingsPage" class="side-page">
    <div class="side-page-header">
      <i class="fas fa-cog side-page-back-icon"></i>
      <span class="side-page-back-text" data-i18n="ui.settings">Settings</span>
      <i id="closeSettingsPage" class="fa-solid fa-circle-arrow-right close-panel" title="Закрыть"></i>
    </div>
    <div class="side-page-content">
      <div class="form-group">
        <label for="serverIp" data-i18n="ui.serverIpLabel">Enter server address to check:</label>
        <input type="text" id="serverIp" class="form-control" value="127.0.0.1" 
               data-i18n-placeholder="placeholders.serverIp"
               autocomplete="off" autocapitalize="off" autocorrect="off" 
               spellcheck="false" data-lpignore="true">
      </div>
      <button id="checkIpButton" class="btn btn-primary mt-3 w-100" data-i18n="ui.checkConnection">Check Connection</button>

      <div class="architecture-selection mt-4">
        <h5 data-i18n="ui.architectureDesc">Launch with x32 or x64</h5>
        <div class="form-check">
          <input type="checkbox" id="architecture32" class="form-check-input">
          <label for="architecture32" class="form-check-label">x32</label>
        </div>
        <div class="form-check">
          <input type="checkbox" id="architecture64" class="form-check-input">
          <label for="architecture64" class="form-check-label">x64</label>
        </div>
      </div>

      <div class="form-group mt-4">
        <label data-i18n="ui.language">Language</label>
        <div class="language-switcher">
          <button type="button" class="lang-btn" data-lang="ru" title="Русский">
            <img src="../assets/images/flag/Russia-flag.png" alt="RU">
          </button>
          <button type="button" class="lang-btn" data-lang="en" title="English">
            <img src="../assets/images/flag/United-states-flag.png" alt="EN">
          </button>
        </div>
      </div>

      <button id="saveConfigButton" class="btn btn-success mt-3 w-100" data-i18n="ui.saveConfiguration">Save Configuration</button>
    </div>
  </div>

  <div id="client-version" class="client-version position-absolute bottom-0 start-0 mb-4 ms-4 text-white" style="display:none;">
    <span data-i18n="ui.loadingVersion">Loading version...</span>
  </div>

  <script src="./libs/jquery/jquery.min.js"></script>
  <script src="./libs/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="./libs/toastr/toastr.min.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
